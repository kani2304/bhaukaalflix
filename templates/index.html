<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BHAUKAALFLIX - Movie Recommendations</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"/>
  <style>
    body {
      font-family: 'Share Tech Mono', monospace;
      background-color: #0a0a1f;
      color: #00ff95;
    }
    .cyber-card {
      background: rgba(16, 16, 48, 0.8);
      border: 1px solid #00ff95;
      box-shadow: 0 0 15px rgba(0, 255, 149, 0.3);
    }
    .cyber-glow {
      text-shadow: 0 0 10px rgba(0, 255, 149, 0.5);
    }
    .cyber-button {
      background: linear-gradient(45deg, #00ff95, #00b8ff);
      transition: all 0.3s ease;
    }
    .cyber-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 20px rgba(0, 255, 149, 0.5);
    }
    .movie-card:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <nav class="p-4 border-b border-[#00ff95]">
    <div class="container mx-auto flex justify-between items-center">
      <h1 class="text-2xl font-bold font-['Orbitron'] cyber-glow">BHAUKAALFLIX</h1>
      <div class="flex items-center gap-4">
        <input id="searchInput" type="search" placeholder="Search movies..." class="bg-[#1a1a3a] border border-[#00ff95] rounded px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#00ff95]">
        <button id="searchBtn" class="cyber-button px-4 py-2 rounded font-bold">Search</button>
      </div>
    </div>
  </nav>

  <main class="container mx-auto px-4 py-8">
    <section class="mb-12">
      <h2 class="text-3xl font-['Orbitron'] mb-6 cyber-glow">Recommended for You</h2>
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6" id="recommendedMovies"></div>
    </section>

    <section class="mb-12">
      <h2 class="text-3xl font-['Orbitron'] mb-6 cyber-glow">Trending Now</h2>
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6" id="trendingMovies"></div>
    </section>

    <section class="mb-12">
      <h2 class="text-3xl font-['Orbitron'] mb-6 cyber-glow">Search Results</h2>
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6" id="searchResults">
        <p class="text-sm text-gray-400">Search for something above...</p>
      </div>
    </section>
  </main>

  <!-- Modal -->
  <div id="modal" class="fixed inset-0 bg-black bg-opacity-80 hidden items-center justify-center z-50">
    <div class="bg-[#121235] border border-[#00ff95] shadow-xl rounded-lg p-6 max-w-md w-full">
      <h3 class="text-2xl font-bold mb-2 cyber-glow" id="modalTitle"></h3>
      <p class="mb-4" id="modalOverview"></p>
      <p><span class="font-bold">Runtime:</span> <span id="modalRuntime"></span> mins</p>
      <p><span class="font-bold">Genres:</span> <span id="modalGenres"></span></p>
      <button onclick="closeModal()" class="mt-6 cyber-button px-4 py-2 rounded text-black font-bold w-full">Close</button>
    </div>
  </div>

  <script>
    function openModal(title, overview, runtime, genres) {
      document.getElementById("modalTitle").innerText = title;
      document.getElementById("modalOverview").innerText = overview;
      document.getElementById("modalRuntime").innerText = runtime ? runtime : "N/A";
      document.getElementById("modalGenres").innerText = genres.join(", ");
      document.getElementById("modal").classList.remove("hidden");
      document.getElementById("modal").classList.add("flex");
    }

    function closeModal() {
      document.getElementById("modal").classList.remove("flex");
      document.getElementById("modal").classList.add("hidden");
    }

    function createMovieCard(movie) {
      const card = document.createElement("div");
      card.className = "cyber-card rounded-lg overflow-hidden movie-card";

      const img = document.createElement("img");
      img.src = movie.image;
      img.alt = movie.title;
      img.className = "w-full h-48 object-cover";

      const details = document.createElement("div");
      details.className = "p-4";

      const title = document.createElement("h3");
      title.className = "text-xl font-bold mb-2";
      title.textContent = movie.title;

      const meta = document.createElement("div");
      meta.className = "flex justify-between items-center";

      const genres = document.createElement("span");
      genres.className = "text-sm";
      genres.textContent = movie.genres.join(', ');

      const rating = document.createElement("div");
      rating.className = "flex items-center";
      rating.innerHTML = `<i class="bi bi-star-fill text-yellow-400 mr-1"></i><span>${movie.rating}</span>`;

      meta.appendChild(genres);
      meta.appendChild(rating);

      const button = document.createElement("button");
      button.className = "cyber-button w-full mt-4 py-2 rounded text-black font-bold";
      button.textContent = "View Details";
      button.addEventListener("click", () => {
        openModal(movie.title, movie.overview, movie.runtime, movie.genres);
      });

      details.appendChild(title);
      details.appendChild(meta);
      details.appendChild(button);

      card.appendChild(img);
      card.appendChild(details);

      return card;
    }

    async function fetchMovies(endpoint, containerId) {
      const container = document.getElementById(containerId);
      container.innerHTML = "<p>Loading...</p>";
      try {
        const res = await fetch(endpoint);
        const data = await res.json();
        container.innerHTML = "";
        data.forEach(movie => {
          const card = createMovieCard(movie);
          container.appendChild(card);
        });
      } catch (err) {
        container.innerHTML = "<p class='text-red-500'>Failed to load movies.</p>";
      }
    }

    fetchMovies('/api/recommendations', 'recommendedMovies');
    fetchMovies('/api/trending', 'trendingMovies');

    const searchInput = document.getElementById("searchInput");
    const searchBtn = document.getElementById("searchBtn");
    const searchResults = document.getElementById("searchResults");
    const recommendedMovies = document.getElementById("recommendedMovies");

    searchBtn.addEventListener("click", () => {
      const query = searchInput.value.trim();
      if (!query) return;
      searchMovies(query);
    });

    searchInput.addEventListener("keypress", e => {
      if (e.key === "Enter") {
        searchBtn.click();
      }
    });

    async function searchMovies(query) {
      searchResults.innerHTML = '<p class="text-sm text-gray-400">Searching...</p>';
      recommendedMovies.innerHTML = '<p class="text-sm text-gray-400">Updating recommendations...</p>';
      try {
        const res = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
        const data = await res.json();

        searchResults.innerHTML = '';
        if (!data.results || data.results.length === 0) {
          searchResults.innerHTML = '<p class="text-yellow-500">No movies found.</p>';
        } else {
          data.results.forEach(movie => {
            const card = createMovieCard(movie);
            searchResults.appendChild(card);
          });
        }

        recommendedMovies.innerHTML = '';
        if (data.recommendations && data.recommendations.length > 0) {
          data.recommendations.forEach(movie => {
            const card = createMovieCard(movie);
            recommendedMovies.appendChild(card);
          });
        }

      } catch (err) {
        searchResults.innerHTML = '<p class="text-red-500">Error loading search results.</p>';
        recommendedMovies.innerHTML = '<p class="text-red-500">Error loading recommendations.</p>';
      }
    }
  </script>
</body>
</html>
